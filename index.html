<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#10251f" />
    <title>Fitness Vinicius</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="/config.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Plano pessoal</p>
          <h1>Fitness Vinicius</h1>
        </div>
        <div class="sync-pill" id="syncStatus">Local</div>
      </header>

      <main>
        <section class="today-band" id="home">
          <div class="today-copy">
            <p class="eyebrow">Dieta de hoje</p>
            <h2>Resumo rápido das páginas finais</h2>
          </div>
          <div class="meal-strip" id="mealStrip"></div>
        </section>

        <nav class="tabs" aria-label="Seções do app">
          <button class="tab is-active" data-view="diet">Dieta</button>
          <button class="tab" data-view="training">Treino</button>
          <button class="tab" data-view="files">Arquivos</button>
        </nav>

        <section class="view is-active" id="dietView">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Dieta</p>
              <h2>Refeições resumidas</h2>
            </div>
            <button class="ghost-button" id="resetMeals">Limpar marcações</button>
          </div>
          <div class="meal-grid" id="mealGrid"></div>
        </section>

        <section class="view" id="trainingView">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Treino</p>
              <h2>Pesos e máquinas</h2>
            </div>
            <select id="workoutSelect" aria-label="Selecionar treino"></select>
          </div>
          <div class="workout-meta" id="workoutMeta"></div>
          <div class="exercise-list" id="exerciseList"></div>
        </section>

        <section class="view" id="filesView">
          <div class="section-heading">
            <div>
              <p class="eyebrow">PDFs originais</p>
              <h2>Consulta completa</h2>
            </div>
          </div>
          <div class="file-grid">
            <a class="file-card" href="/Arquivos/Dieta_Vinicius.pdf" target="_blank" rel="noreferrer">
              <span>Dieta</span>
              <strong>Dieta_Vinicius.pdf</strong>
            </a>
            <a class="file-card" href="/Arquivos/Treino_vinicius.pdf" target="_blank" rel="noreferrer">
              <span>Treino</span>
              <strong>Treino_vinicius.pdf</strong>
            </a>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
